# Bootstrap metadata for the search-space release catalog.
#
# The Search Space release scripts copy this file into dist/.../release-inputs
# when there is no prior search-spaces-* release to seed from. Operators then
# stage the approved .bin files and run `make update-search-space-catalog`.
# That script treats the staged .bin files as the desired complete catalog and
# rewrites the copied manifest-source.yaml before release assets are generated.
#
# Do not add large release .bin files to this directory or to Git history.
#
# Required fields per entry:    compiler, compiler_version, filename.
# Optional fields per entry:    variant, description, search_space_format.

entries:
  - compiler: ptxas
    compiler_version: "13.3"
    variant: default
    filename: ptxas13.3_search_space.bin

  - compiler: ptxas
    compiler_version: "13.3"
    variant: att
    filename: ptxas13.3_att_search_space.bin
    description: "Curated for attention kernels (FlashAttention, GQA, MHA, MLA, FlashInfer Batch Decode)"

  - compiler: nvcc
    compiler_version: "13.3"
    variant: default
    filename: nvcc13.3_search_space.bin
