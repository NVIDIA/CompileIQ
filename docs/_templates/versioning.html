{%- if versions %}
<div class="sidebar-primary-items__start sidebar-primary__section">
    <p class="sidebar-primary__title">Versions</p>
    <ul class="nav bd-sidenav">
        {%- for item in versions.in_development %}
        <li class="nav-item{% if item.name == current_version.name %} active{% endif %}">
            <a class="nav-link{% if item.name == current_version.name %} current{% endif %}" href="{{ item.url }}">
                {%- if item.name == "main" %}developer{%- else %}{{ item.name }}{%- endif %}
            </a>
        </li>
        {%- endfor %}
        {%- for item in versions.releases | reverse %}
        <li class="nav-item{% if item.name == current_version.name %} active{% endif %}">
            <a class="nav-link{% if item.name == current_version.name %} current{% endif %}" href="{{ item.url }}">
                {{ item.name }}
            </a>
        </li>
        {%- endfor %}
    </ul>
</div>
{%- endif %}
